name: Auto Tag on Release PR Merge

# Watches for `release/<version>` PRs merging into `main`. When one
# does, read the new `.version` from build.zig.zon, push the
# corresponding `v<version>` tag, and dispatch release.yml against
# that tag. The dispatch step is required because tag pushes coming
# from GITHUB_TOKEN do not propagate the `push: tags` event to
# release.yml; modeled after nihen/ah's auto-tag flow.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  tag:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Tag and dispatch release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk -F '"' '/^[[:space:]]*\.version[[:space:]]*=/{print $2; exit}' build.zig.zon)"
          if [[ -z "${version}" ]]; then
            echo "::error::could not read .version from build.zig.zon"
            exit 1
          fi
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::build.zig.zon .version='${version}' is not semver"
            exit 1
          fi
          tag="v${version}"
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::tag ${tag} already exists; bump build.zig.zon before merging the next release PR"
            exit 1
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "${tag}" -m "${tag}"
          git push origin "${tag}"
          gh workflow run release.yml --ref "${tag}" -f tag="${tag}"
