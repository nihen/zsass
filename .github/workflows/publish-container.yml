name: Publish container

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to package (e.g. v0.3.1)'
        required: true
      publish_latest:
        description: 'Also move the latest tag to this release'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Derive image version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::TAG must look like vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-PRERELEASE; got '${TAG}'"
            exit 1
          fi
          version="${TAG#v}"
          gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.TAG }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ inputs.publish_latest }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            ZSASS_VERSION=${{ steps.version.outputs.version }}
            ZSASS_REPO=${{ github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
